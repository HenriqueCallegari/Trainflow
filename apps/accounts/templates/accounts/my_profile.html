{% extends "base.html" %}
{% block content %}
<div class="page-header"><div><h1>Meu perfil</h1></div></div>
<div class="card form-panel">
  <form method="post">{% csrf_token %}
    <div class="form-grid">
      {% for field in form %}
        <div class="field {% if field.name == 'bio' %}full-width{% endif %}">
          <label>{{ field.label }}</label>{{ field }}
          {% if field.errors %}<small style="color:var(--danger);">{{ field.errors|join:", " }}</small>{% endif %}
        </div>
      {% endfor %}
    </div>
    <div class="actions" style="margin-top: 18px;">
      <button class="btn" type="submit">Salvar</button>
    </div>
  </form>
</div>
{% endblock %}
