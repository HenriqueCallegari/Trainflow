{% extends "base.html" %}
{% block content %}
<div class="auth-panel card">
  <h1>Entrar</h1>
  <form method="post">{% csrf_token %}
    {% if form.non_field_errors %}<div class="alert alert-error">{{ form.non_field_errors }}</div>{% endif %}
    {% for field in form %}
      <div class="field" style="margin-bottom: 14px;">
        <label>{{ field.label }}</label>{{ field }}
        {% if field.errors %}<small style="color:var(--danger);">{{ field.errors|join:", " }}</small>{% endif %}
      </div>
    {% endfor %}
    <button class="btn" type="submit">Entrar</button>
    <a class="btn btn-outline" href="{% url 'accounts:register' %}">Sou treinador, criar conta</a>
  </form>
</div>
{% endblock %}
